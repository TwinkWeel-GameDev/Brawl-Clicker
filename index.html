<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brawl Clicker: ULTIMATE NULL'S</title>
    <style>
        :root {
            --bg: #050508; --panel: #12121a; --red: #ff0044;
            --purple: #8a2be2; --gold: #ffcc00; --green: #00ff66; --cyan: #00ffff;
        }
        body { 
            background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; 
            margin: 0; padding: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column;
        }

        /* Шапка */
        .header { 
            display: flex; justify-content: space-around; padding: 15px 5px; 
            border-bottom: 3px solid var(--red); background: #1a0005; height: 70px;
        }
        .stat-box { display: flex; flex-direction: column; align-items: center; }
        .stat-val { font-size: 18px; font-weight: 900; }

        /* Зона тапу - чітка висота */
        .game-area { 
            height: 35vh; min-height: 200px; display: flex; align-items: center; 
            justify-content: center; position: relative;
        }
        #char { font-size: 100px; transition: 0.05s; z-index: 5; cursor: pointer; }

        /* UI Панель - ВИПРАВЛЕНО СКРОЛ */
        .ui-panel { 
            flex: 1; background: var(--panel); border-top: 3px solid #333; 
            display: flex; flex-direction: column; overflow: hidden; /* Важливо */
        }
        .nav-tabs { display: flex; background: #0a0a12; padding: 5px; }
        .nav-btn { flex: 1; padding: 12px; text-align: center; font-weight: 900; font-size: 12px; cursor: pointer; }
        .nav-btn.active { background: var(--purple); border-radius: 10px; }

        /* Контент табів зі скролом */
        .tab-content { 
            display: none; padding: 15px; overflow-y: auto; height: 100%; /* Дозволяє крутити вниз */
            padding-bottom: 100px; /* Місце для нижніх кнопок */
        }
        .tab-content.active { display: block; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .card { background: #1c1c2d; border-radius: 15px; padding: 15px; text-align: center; border: 1px solid #334; }
        button { width: 100%; padding: 10px; border-radius: 10px; border: none; font-weight: 900; color: #fff; margin-top: 5px; }
        .btn-buy { background: var(--red); box-shadow: 0 4px #800; }
        .btn-buy:disabled { opacity: 0.3; box-shadow: none; }

        #notify {
            position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
            background: var(--purple); padding: 10px 20px; border-radius: 20px; z-index: 100; display: none;
        }
    </style>
</head>
<body>

<div id="notify"></div>

<div class="header">
    <div class="stat-box" style="color: var(--gold)">🏆 <span id="trophies" class="stat-val">0</span></div>
    <div class="stat-box" style="color: var(--green)">💎 <span id="gems" class="stat-val">0</span></div>
    <div class="stat-box" style="color: var(--purple)">✨ <span id="prime" class="stat-val">0</span></div>
</div>

<div class="game-area" id="tap-area">
    <div id="char">🧣</div>
</div>

<div class="ui-panel">
    <div class="nav-tabs">
        <div class="nav-btn active" onclick="showTab('shop', event)">МАГАЗИН</div>
        <div class="nav-btn" onclick="showTab('upgrades', event)">ПРОКАЧКА</div>
    </div>

    <div class="tab-content active" id="tab-shop">
        <div class="grid">
            <div class="card" style="grid-column: span 2;">
                <div>🎭 НАСТУПНИЙ БІЄЦЬ</div>
                <button class="btn-buy" onclick="nextSkin()">ЗМІНИТИ</button>
            </div>
            <div class="card">
                <div>📦 СКРИНЯ</div>
                <button class="btn-buy" id="btn-box" onclick="buyBox()">1.5K 🏆</button>
            </div>
            <div class="card">
                <div>👑 ПРАЙМ</div>
                <button class="btn-buy" id="btn-prime" onclick="prestige()" style="background:var(--purple)">LEVEL UP</button>
            </div>
        </div>
    </div>

    <div class="tab-content" id="tab-upgrades">
        <div class="grid">
            <div class="card">
                <div id="lvl-pwr">Lvl 1</div>
                <div>🧨 СИЛА</div>
                <button class="btn-buy" id="btn-pwr" onclick="upPwr()">+5 (<span id="cost-pwr">100</span>)</button>
            </div>
            <div class="card">
                <div id="lvl-auto">Lvl 0</div>
                <div>🤖 АВТО</div>
                <button class="btn-buy" id="btn-auto" onclick="upAuto()">+10/с (<span id="cost-auto">500</span>)</button>
            </div>
            <div class="card" style="grid-column: span 2;">
                <div>🚀 NULL'S SERVER</div>
                <button class="btn-buy" id="btn-server" onclick="upServer()">+500/с (50K)</button>
            </div>
        </div>
    </div>
</div>

<script>
    // СИНТЕЗАТОР ЗВУКУ (Працює без файлів!)
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(freq, type, duration) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type; osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    const sfx = {
        tap: () => playSound(400, 'sine', 0.1),
        buy: () => playSound(800, 'square', 0.2),
        prime: () => { playSound(500, 'sawtooth', 0.3); setTimeout(() => playSound(700, 'sawtooth', 0.4), 100); }
    };

    // ЛОГІКА ГРИ
    let state = JSON.parse(localStorage.getItem('brawlData')) || {
        trophies: 0, gems: 0, prime: 0, power: 1, auto: 0,
        costs: { pwr: 100, auto: 500, server: 50000 },
        lvls: { pwr: 1, auto: 0 }, skinIdx: 0
    };

    const skins = ["🧣", "🦅", "🌑", "🔥", "👑", "👺", "💀", "👽"];

    function update() {
        document.getElementById('trophies').innerText = Math.floor(state.trophies);
        document.getElementById('gems').innerText = state.gems;
        document.getElementById('prime').innerText = state.prime;
        document.getElementById('lvl-pwr').innerText = "Lvl " + state.lvls.pwr;
        document.getElementById('cost-pwr').innerText = state.costs.pwr;
        document.getElementById('lvl-auto').innerText = "Lvl " + state.lvls.auto;
        document.getElementById('cost-auto').innerText = state.costs.auto;
        
        document.getElementById('btn-pwr').disabled = state.trophies < state.costs.pwr;
        document.getElementById('btn-auto').disabled = state.trophies < state.costs.auto;
        document.getElementById('btn-server').disabled = state.trophies < 50000;
        
        document.getElementById('char').innerText = skins[state.skinIdx];
        localStorage.setItem('brawlData', JSON.stringify(state));
    }

    function handleTap() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        state.trophies += (state.power + (state.prime * 50));
        if (Math.random() < 0.05) state.gems++;
        sfx.tap();
        update();
    }

    document.getElementById('tap-area').addEventListener('mousedown', handleTap);
    document.getElementById('tap-area').addEventListener('touchstart', (e) => { e.preventDefault(); handleTap(); });

    function upPwr() {
        if (state.trophies >= state.costs.pwr) {
            state.trophies -= state.costs.pwr;
            state.power += 5; state.lvls.pwr++;
            state.costs.pwr = Math.round(state.costs.pwr * 1.6);
            sfx.buy(); update();
        }
    }

    function upAuto() {
        if (state.trophies >= state.costs.auto) {
            state.trophies -= state.costs.auto;
            state.auto += 10; state.lvls.auto++;
            state.costs.auto = Math.round(state.costs.auto * 2);
            sfx.buy(); update();
        }
    }

    function upServer() {
        if (state.trophies >= 50000) {
            state.trophies -= 50000; state.auto += 500;
            sfx.buy(); update();
        }
    }

    function buyBox() {
        if (state.trophies >= 1500) {
            state.trophies -= 1500; state.gems += 15;
            sfx.buy(); update();
        }
    }

    function prestige() {
        let req = 100000 * (state.prime + 1);
        if (state.trophies >= req) {
            state.prime++; state.trophies = 0; state.power = 1; state.auto = 0;
            state.costs = { pwr: 100, auto: 500, server: 50000 };
            state.lvls = { pwr: 1, auto: 0 };
            sfx.prime(); update();
            alert("НОВИЙ ПРАЙМ!");
        }
    }

    function nextSkin() { state.skinIdx = (state.skinIdx + 1) % skins.length; sfx.tap(); update(); }

    function showTab(name, e) {
        sfx.tap();
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + name).classList.add('active');
        e.target.classList.add('active');
    }

    setInterval(() => { if (state.auto > 0) { state.trophies += state.auto / 10; update(); } }, 100);
    update();
</script>
</body>
</html>

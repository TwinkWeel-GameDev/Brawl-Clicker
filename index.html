<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brawl Clicker: ULTIMATE NULL'S</title>
    <style>
        :root {
            --bg: #050508; --panel: #12121a; --red: #ff0044;
            --purple: #8a2be2; --gold: #ffcc00; --cyan: #00ffff; --green: #00ff66;
        }

        body { 
            background: var(--bg); color: #fff; font-family: 'Segoe UI', 'Arial Black', sans-serif; 
            margin: 0; padding: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }

        /* Анімації */
        @keyframes shake { 0%, 100% { transform: translate(0,0); } 25% { transform: translate(2px, -2px); } 75% { transform: translate(-2px, 2px); } }
        .hyper-active { animation: shake 0.1s infinite; background: radial-gradient(circle, #300 0%, #050508 100%) !important; }

        /* Шапка - Фіксована */
        .header { 
            display: flex; justify-content: space-around; background: linear-gradient(180deg, #1a0005 0%, var(--bg) 100%);
            padding: 10px 0; border-bottom: 3px solid var(--red); height: 70px; flex-shrink: 0;
        }
        .stat-box { display: flex; flex-direction: column; align-items: center; min-width: 70px; }
        .stat-label { font-size: 9px; color: #aaa; text-transform: uppercase; }
        .stat-val { font-size: 18px; font-weight: 900; text-shadow: 0 0 10px rgba(255,255,255,0.3); }

        /* Зона тапу - Фіксована */
        .game-area { 
            height: 35vh; position: relative; display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle, rgba(138, 43, 226, 0.1) 0%, transparent 70%); flex-shrink: 0;
        }
        #char { 
            font-size: 120px; transition: transform 0.05s; z-index: 5; filter: drop-shadow(0 0 20px rgba(0,0,0,0.5));
        }
        .combo-meter {
            position: absolute; right: 20px; top: 10px; color: var(--cyan); font-style: italic;
            font-size: 20px; font-weight: 900; opacity: 0; transition: 0.3s;
        }

        /* UI Панель - СКРОЛ ПРАЦЮЄ ТУТ */
        .ui-panel { 
            flex: 1; background: var(--panel); border-top: 3px solid #333; 
            border-radius: 25px 25px 0 0; display: flex; flex-direction: column; overflow: hidden;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.8);
        }
        .nav-tabs { display: flex; background: #0a0a12; padding: 5px; flex-shrink: 0; }
        .nav-btn { 
            flex: 1; padding: 12px; cursor: pointer; color: #666; font-size: 11px; font-weight: 900;
            text-align: center; transition: 0.3s; border-radius: 15px;
        }
        .nav-btn.active { color: #fff; background: var(--purple); box-shadow: 0 0 15px var(--purple); }

        .tab-content { flex: 1; overflow-y: auto; padding: 15px; display: none; padding-bottom: 50px; }
        .tab-content.active { display: block; }

        /* Картки */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card { 
            background: #1c1c2d; border-radius: 15px; padding: 12px; border: 1px solid #334;
            display: flex; flex-direction: column; align-items: center; position: relative;
        }
        .card-lvl { position: absolute; top: 5px; right: 8px; font-size: 9px; color: var(--cyan); }
        .card-icon { font-size: 28px; margin-bottom: 5px; }
        .card-name { font-size: 12px; font-weight: bold; margin-bottom: 5px; color: #ddd; text-align: center; }
        
        button { 
            width: 100%; border: none; padding: 8px; border-radius: 10px; font-weight: 900;
            color: white; transition: 0.1s; cursor: pointer; font-size: 11px;
        }
        .btn-buy { background: linear-gradient(180deg, var(--red), #800); box-shadow: 0 3px #500; }
        .btn-buy:active { transform: translateY(2px); box-shadow: none; }
        .btn-buy:disabled { background: #333 !important; box-shadow: none !important; opacity: 0.4; }

        /* Ефекти */
        .floating-text { 
            position: absolute; pointer-events: none; animation: floatUp 0.6s forwards; 
            font-weight: 900; font-size: 24px; z-index: 100;
        }
        @keyframes floatUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-80px); opacity: 0; } }

        .quest-item { background: #0a0a12; margin-bottom: 8px; padding: 10px; border-radius: 12px; border-left: 4px solid var(--green); }
        #notify {
            position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
            background: var(--purple); padding: 8px 20px; border-radius: 30px;
            z-index: 200; font-weight: bold; display: none; border: 2px solid #fff; font-size: 12px;
        }
    </style>
</head>
<body id="main-body">

<div id="notify">Повідомлення!</div>

<div class="header">
    <div class="stat-box" style="color: var(--gold)">
        <span class="stat-label">🏆 trophies</span>
        <span id="trophies" class="stat-val">0</span>
    </div>
    <div class="stat-box" style="color: var(--green)">
        <span class="stat-label">💎 gems</span>
        <span id="gems" class="stat-val">0</span>
    </div>
    <div class="stat-box" style="color: var(--purple)">
        <span class="stat-label">✨ prime</span>
        <span id="prime" class="stat-val">0</span>
    </div>
</div>

<div class="game-area" id="tap-area">
    <div class="combo-meter" id="combo-ui">COMBO x2</div>
    <div id="char">🧣</div>
</div>

<div class="ui-panel">
    <div class="nav-tabs">
        <div class="nav-btn active" onclick="showTab('shop', event)">МАГАЗИН</div>
        <div class="nav-btn" onclick="showTab('upgrades', event)">ПРОКАЧКА</div>
        <div class="nav-btn" onclick="showTab('quests', event)">КВЕСТИ</div>
    </div>

    <div class="tab-content active" id="tab-shop">
        <div class="grid">
            <div class="card" style="grid-column: span 2;">
                <div class="card-icon">🎭</div>
                <div class="card-name">НАСТУПНИЙ БІЄЦЬ</div>
                <button class="btn-buy" onclick="nextSkin()">ЗМІНИТИ (FREE)</button>
            </div>
            <div class="card">
                <div class="card-icon">📦</div>
                <div class="card-name">СКРИНЯ</div>
                <button class="btn-buy" id="btn-box" onclick="buyBox()" style="background: var(--gold); color: #000;">1.5K 🏆</button>
            </div>
            <div class="card">
                <div class="card-icon">⚡</div>
                <div class="card-name">ГІПЕРЗАРЯД</div>
                <button class="btn-buy" id="btn-hyper" onclick="buyHyper()" style="background: var(--purple);">100 💎</button>
            </div>
            <div class="card" style="grid-column: span 2; border: 2px solid var(--purple);">
                <div class="card-icon">👑</div>
                <div class="card-name">ПРАЙМ ПРЕСТИЖ</div>
                <button class="btn-buy" id="btn-prime" onclick="prestige()" style="background: var(--purple);">LEVEL UP</button>
            </div>
        </div>
    </div>

    <div class="tab-content" id="tab-upgrades">
        <div class="grid">
            <div class="card">
                <span class="card-lvl" id="lvl-pwr">Lvl 1</span>
                <div class="card-icon">🧨</div>
                <div class="card-name">СИЛА</div>
                <button class="btn-buy" id="btn-pwr" onclick="upPwr()">+5 (<span id="cost-pwr">100</span>)</button>
            </div>
            <div class="card">
                <span class="card-lvl" id="lvl-auto">Lvl 0</span>
                <div class="card-icon">🤖</div>
                <div class="card-name">АВТО</div>
                <button class="btn-buy" id="btn-auto" onclick="upAuto()">+10/с (<span id="cost-auto">500</span>)</button>
            </div>
        </div>
    </div>

    <div class="tab-content" id="tab-quests">
        <div id="quest-list"></div>
    </div>
</div>

<script>
    // ЗВУКОВА СИСТЕМА
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSfx(f, t, d) {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.type = t; o.frequency.value = f;
        g.gain.setValueAtTime(0.1, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(); o.stop(audioCtx.currentTime + d);
    }

    const sfx = {
        tap: () => playSfx(400, 'sine', 0.1),
        buy: () => playSfx(800, 'square', 0.2),
        prime: () => { playSfx(500, 'sawtooth', 0.3); setTimeout(()=>playSfx(700,'sawtooth',0.4),100); }
    };

    let state = JSON.parse(localStorage.getItem('brawlDataV3')) || {
        trophies: 0, gems: 0, prime: 0, power: 1, auto: 0,
        costs: { pwr: 100, auto: 500 }, lvls: { pwr: 1, auto: 0 },
        skinIdx: 0, hyper: false, combo: 0, lastTap: 0, totalClicks: 0
    };

    const skins = ["🧣", "🦅", "🌑", "🔥", "👑", "👺", "💀", "👽", "👾", "🤖"];

    function f(n) { return n >= 1000 ? (n/1000).toFixed(1) + "K" : Math.floor(n); }

    function notify(text) {
        const el = document.getElementById('notify');
        el.innerText = text; el.style.display = 'block';
        setTimeout(() => el.style.display = 'none', 2000);
    }

    function update() {
        document.getElementById('trophies').innerText = f(state.trophies);
        document.getElementById('gems').innerText = f(state.gems);
        document.getElementById('prime').innerText = state.prime;
        document.getElementById('lvl-pwr').innerText = "Lvl " + state.lvls.pwr;
        document.getElementById('cost-pwr').innerText = f(state.costs.pwr);
        document.getElementById('lvl-auto').innerText = "Lvl " + state.lvls.auto;
        document.getElementById('cost-auto').innerText = f(state.costs.auto);
        
        document.getElementById('btn-pwr').disabled = state.trophies < state.costs.pwr;
        document.getElementById('btn-auto').disabled = state.trophies < state.costs.auto;
        document.getElementById('btn-box').disabled = state.trophies < 1500;
        document.getElementById('btn-hyper').disabled = state.gems < 100 || state.hyper;

        let pReq = 100000 * (state.prime + 1);
        document.getElementById('btn-prime').innerText = `UP (${f(pReq)})`;
        document.getElementById('btn-prime').disabled = state.trophies < pReq;
        document.getElementById('char').innerText = skins[state.skinIdx];

        localStorage.setItem('brawlDataV3', JSON.stringify(state));
        renderQuests();
    }

    function handleTap(e) {
        const now = Date.now();
        state.combo = (now - state.lastTap < 300) ? Math.min(state.combo + 1, 50) : 0;
        state.lastTap = now;

        let mult = (1 + Math.floor(state.combo/10)) * (state.hyper ? 10 : 1);
        let gain = (state.power + (state.prime * 50)) * mult;
        
        state.trophies += gain; state.totalClicks++;
        sfx.tap();

        const char = document.getElementById('char');
        char.style.transform = 'scale(0.8) rotate(-5deg)';
        setTimeout(() => char.style.transform = 'scale(1) rotate(0deg)', 50);

        const x = e.touches ? e.touches[0].pageX : e.pageX;
        const y = e.touches ? e.touches[0].pageY : e.pageY;
        showFloat(x, y, "+" + f(gain), state.hyper ? 'var(--purple)' : '#fff');

        const cUI = document.getElementById('combo-ui');
        cUI.style.opacity = state.combo > 5 ? 1 : 0;
        cUI.innerText = `COMBO x${1 + Math.floor(state.combo/10)}`;

        if(Math.random() < 0.02) { state.gems++; showFloat(x, y-40, "+1 💎", 'var(--green)'); }
        update();
    }

    function showFloat(x, y, txt, clr) {
        const d = document.createElement('div');
        d.className = 'floating-text'; d.innerText = txt; d.style.left = x+'px'; d.style.top = y+'px'; d.style.color = clr;
        document.body.appendChild(d); setTimeout(() => d.remove(), 600);
    }

    const tA = document.getElementById('tap-area');
    tA.addEventListener('touchstart', (e)=>{e.preventDefault(); handleTap(e)}, {passive:false});
    tA.addEventListener('mousedown', handleTap);

    function upPwr() { if(state.trophies >= state.costs.pwr) { sfx.buy(); state.trophies -= state.costs.pwr; state.power += 5; state.lvls.pwr++; state.costs.pwr = Math.round(state.costs.pwr*1.7); update(); } }
    function upAuto() { if(state.trophies >= state.costs.auto) { sfx.buy(); state.trophies -= state.costs.auto; state.auto += 10; state.lvls.auto++; state.costs.auto = Math.round(state.costs.auto*2); update(); } }
    function buyBox() { if(state.trophies >= 1500) { sfx.buy(); state.trophies -= 1500; state.gems += Math.floor(Math.random()*15)+5; update(); } }
    function nextSkin() { sfx.tap(); state.skinIdx = (state.skinIdx + 1) % skins.length; update(); }

    function buyHyper() {
        if(state.gems >= 100) {
            sfx.prime(); state.gems -= 100; state.hyper = true;
            document.body.classList.add('hyper-active');
            notify("ГІПЕРЗАРЯД x10!");
            setTimeout(() => { state.hyper = false; document.body.classList.remove('hyper-active'); update(); }, 15000);
            update();
        }
    }

    function prestige() {
        let req = 100000 * (state.prime + 1);
        if(state.trophies >= req) {
            sfx.prime(); state.prime++; state.trophies = 0; state.power = 1; state.auto = 0;
            state.costs = { pwr: 100, auto: 500 }; state.lvls = { pwr: 1, auto: 0 };
            notify(`✨ ПРАЙМ ${state.prime}!`); update();
        }
    }

    function showTab(t, e) {
        sfx.tap();
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + t).classList.add('active');
        e.target.classList.add('active');
    }

    function renderQuests() {
        const qL = document.getElementById('quest-list');
        const qs = [
            { n: "Клікер", c: 500, v: state.totalClicks, r: "10 💎" },
            { n: "Багатій", c: 10000, v: state.trophies, r: "50 💎" }
        ];
        qL.innerHTML = qs.map(q => `
            <div class="quest-item" style="opacity: ${q.v >= q.c ? 1 : 0.5}">
                <b>${q.n}</b><br><small>${f(q.v)}/${f(q.c)} | Нагорода: ${q.r}</small>
            </div>
        `).join('');
    }

    setInterval(() => { if(state.auto > 0) { state.trophies += state.auto/10; update(); } }, 100);
    update();
</script>
</body>
</html>
